<!DOCTYPE html>
<html>
  <head>
    <title>Ayrie Bedroom</title>
      <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

  </head>
  <body>
    <a-scene background="color: #111">
      
      <a-assets>
       <img id="plank_diff" src="../assets/textures/plank/plank_flooring_04_diff_1k.png" alt="">

      <img id="plank_nor" src="../assets/textures/plank/plank_flooring_04_nor_gl_1k.png" alt="">

      <img id="plank_rough" src="../assets/textures/plank/plank_flooring_04_rough_1k.png" alt="">

      <img id="plank_ao" src="../assets/textures/plank/plank_flooring_04_ao_1k.png" alt="">
      </a-assets>

      <a-entity position="0 1.6 4">
        <a-camera></a-camera>
      </a-entity>

      <a-light type="ambient" color="#222" intensity="0.4"></a-light>
      <a-light type="point" color="#ffaa00" intensity="0.8" distance="5" position="3.5 1.5 2.2"></a-light>
      <a-light type="point" color="#ffaa00" intensity="0.8" distance="5" position="3.5 1.5 -2.2"></a-light>
      <a-light type="point" color="#ffffff" intensity="1.2" distance="6" position="-3.5 1.8 0"></a-light>

      <a-plane 
        src="#plank_diff" 
        normal-map="#plank_nor" 
        roughness-map="#plank_rough"
        ambient-occlusion-map="#plank_ao" 
        rotation="-90 0 0" 
        width="10" 
        height="10" 
        position="0 0 0">
     
      </a-plane>

      <a-plane position="0 2 -5" rotation="0 0 0" width="10" height="4" color="#555"></a-plane>
      <a-plane position="0 2 5" rotation="0 180 0" width="10" height="4" color="#555"></a-plane>
      <a-plane position="-5 2 0" rotation="0 90 0" width="10" height="4" color="#555"></a-plane>
      <a-plane position="5 2 0" rotation="0 -90 0" width="10" height="4" color="#555"></a-plane>
      
      <a-box color="#422" position="-2.5 1.1 -4.9" scale="1.2 2.2 0.1"></a-box>

      <a-box color="#4a2c1a" position="-4 0.4 0" scale="1.5 0.8 4"></a-box>
      <a-box color="#111" position="-4 1.0 0" scale="0.1 0.3 0.2"></a-box>
      <a-box color="#222" position="-3.9 1.8 0" scale="0.2 1.5 2.5"></a-box>
      <a-plane color="#ffffff" material="color:#fff" position="-3.79 1.8 0" rotation="0 90 0" width="2.3" height="1.1"></a-plane>

      <a-box color="#c0bcb6" position="-0.5 0.05 0" scale="2 0.1 3"></a-box>
      <a-box color="#4a6a8a" position="2.5 0.4 0" scale="4 0.8 3"></a-box>
      <a-box color="#ffffff" position="3.8 0.85 0.6" scale="0.8 0.2 1"></a-box>
      <a-box color="#ffffff" position="3.8 0.85 -0.6" scale="0.8 0.2 1"></a-box>

      <a-box color="#4a2c1a" position="3.8 0.3 2.2" scale="1.2 0.6 1.2"></a-box>
      <a-box color="#4a2c1a" position="3.8 0.3 -2.2" scale="1.2 0.6 1.2"></a-box>
      <a-cylinder color="#f5f5dc" position="3.8 0.9 2.2" radius="0.3" height="0.5"></a-cylinder>
      <a-cylinder color="#f5f5dc" position="3.8 0.9 -2.2" radius="0.3" height="0.5"></a-cylinder>

    </a-scene>
  </body>
</html>
